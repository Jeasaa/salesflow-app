<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalesFlow</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Satoshi:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Satoshi',sans-serif;min-height:100vh;transition:background .3s,color .3s;}
input,select,textarea,button{font-family:'Satoshi',sans-serif;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{border-radius:3px;}

/* DARK THEME */
body.dark{--bg:#09090b;--bg2:#18181b;--bg3:#27272a;--bg4:#3f3f46;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--accent:#8b5cf6;--accent2:#7c3aed;--accent-glow:rgba(139,92,246,0.15);--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--sidebar-bg:#18181b;--sidebar-border:#27272a;background:var(--bg);color:var(--text);}
body.dark ::-webkit-scrollbar-thumb{background:#3f3f46;}

/* LIGHT THEME */
body.light{--bg:#f8fafc;--bg2:#ffffff;--bg3:#e2e8f0;--bg4:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#94a3b8;--accent:#7c3aed;--accent2:#6d28d9;--accent-glow:rgba(124,58,237,0.1);--green:#16a34a;--red:#dc2626;--amber:#d97706;--blue:#2563eb;--sidebar-bg:#0f172a;--sidebar-border:#1e293b;background:var(--bg);color:var(--text);}
body.light ::-webkit-scrollbar-thumb{background:#cbd5e1;}
body.light .sidebar *{color:#e2e8f0 !important;}

.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--sidebar-bg);border-right:1px solid var(--sidebar-border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;padding:20px 12px;}
.sidebar .logo{font-size:1.2rem;font-weight:800;padding:0 8px;margin-bottom:4px;color:#e2e8f0;}.sidebar .logo span{color:var(--accent);}
.sidebar .user{font-size:0.75rem;color:#94a3b8;padding:0 8px;margin-bottom:20px;}
.sidebar .sl{font-size:0.65rem;color:#64748b;text-transform:uppercase;letter-spacing:1.2px;font-weight:700;padding:12px 8px 6px;}
.sidebar nav{flex:1;display:flex;flex-direction:column;gap:1px;}
.sidebar nav button{display:flex;align-items:center;gap:10px;padding:9px 12px;border:none;background:none;color:#94a3b8;font-size:0.84rem;font-weight:500;border-radius:8px;cursor:pointer;transition:all .12s;text-align:left;width:100%;}
.sidebar nav button:hover{background:rgba(255,255,255,0.06);color:#e2e8f0;}
.sidebar nav button.active{background:var(--accent-glow);color:var(--accent);font-weight:600;}
.sidebar nav button .badge{margin-left:auto;background:var(--red);color:white;font-size:0.65rem;font-weight:700;padding:2px 6px;border-radius:8px;}
.sidebar .bottom{margin-top:auto;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);}
.sidebar .bottom button{width:100%;padding:7px;border:1px solid rgba(255,255,255,0.1);background:none;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.78rem;}
.sidebar .bottom button:hover{border-color:var(--red);color:var(--red);}
.main{margin-left:220px;flex:1;min-height:100vh;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--bg3);position:sticky;top:0;background:var(--bg);z-index:50;}
.topbar h1{font-size:1.15rem;font-weight:700;gap:8px;display:flex;align-items:center;}
.topbar-actions{display:flex;align-items:center;gap:6px;}
.search-btn{background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:6px 10px;color:var(--text3);cursor:pointer;font-size:0.82rem;}
.search-btn:hover{border-color:var(--bg4);color:var(--text2);}
.content{padding:20px 28px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px;}
.kpi{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:14px 16px;}
.kpi .label{font-size:0.68rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;font-weight:600;margin-bottom:3px;}
.kpi .value{font-size:1.3rem;font-weight:700;font-family:'JetBrains Mono',monospace;}
.kpi .value.green{color:var(--green);}.kpi .value.amber{color:var(--amber);}.kpi .value.red{color:var(--red);}.kpi .value.accent{color:var(--accent);}
.tbl{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;overflow:hidden;margin-bottom:18px;}
.tbl table{width:100%;border-collapse:collapse;}
.tbl th{background:var(--bg3);padding:9px 12px;text-align:left;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.6px;color:var(--text3);font-weight:600;}
.tbl td{padding:9px 12px;border-top:1px solid var(--bg3);font-size:0.82rem;color:var(--text2);}
.tbl tr:hover td{background:rgba(139,92,246,0.02);}
.bs{display:inline-block;padding:2px 8px;border-radius:6px;font-size:0.68rem;font-weight:600;cursor:default;user-select:none;}
.bs.en-cours{background:rgba(251,191,36,0.1);color:var(--amber);}
.bs.validee{background:rgba(59,130,246,0.1);color:var(--blue);}
.bs.payee{background:rgba(34,197,94,0.1);color:var(--green);}
.bs.annulee{background:rgba(239,68,68,0.1);color:var(--red);}
.bs.non-payee{background:rgba(251,191,36,0.1);color:var(--amber);}
.bs.clickable{cursor:pointer;transition:box-shadow .12s;}.bs.clickable:hover{box-shadow:0 0 0 2px currentColor;}
.bt{display:inline-block;padding:2px 7px;border-radius:5px;font-size:0.66rem;font-weight:600;background:var(--accent-glow);color:var(--accent);}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:20px;margin-bottom:14px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:8px;}
.fg label{font-size:0.68rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;}
.fg input,.fg select,.fg textarea{background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:7px 10px;color:var(--text);font-size:0.84rem;outline:none;}
.fg input:focus,.fg select:focus{border-color:var(--accent);}
.btn{padding:7px 14px;border:none;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;}
.btn-p{background:var(--accent);color:white;}.btn-p:hover{background:var(--accent2);}
.btn-d{background:rgba(239,68,68,0.1);color:var(--red);}.btn-d:hover{background:rgba(239,68,68,0.18);}
.btn-g{background:none;color:var(--text2);border:1px solid var(--bg3);}.btn-g:hover{border-color:var(--text3);}
.btn-sm{padding:4px 8px;font-size:0.72rem;}
.profil-h{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:12px;padding:24px;margin-bottom:18px;position:relative;color:white;}
.profil-h h3{font-size:1.2rem;font-weight:700;margin-bottom:5px;color:white;}.profil-h p{color:#c7d2fe;font-size:0.82rem;}
.profil-badge{display:inline-block;background:rgba(139,92,246,0.2);color:#a5b4fc;padding:3px 10px;border-radius:14px;font-size:0.72rem;font-weight:600;margin-top:6px;}
.profil-edit{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.1);border:none;color:white;border-radius:8px;padding:5px 7px;cursor:pointer;font-size:0.85rem;}.profil-edit:hover{background:rgba(255,255,255,0.2);}
.cred-box{background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--text2);white-space:pre-wrap;margin-bottom:14px;}
.note-item{background:var(--bg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:8px 12px;margin:5px 0;font-size:0.84rem;color:var(--text2);}
.note-item .nm{font-size:0.66rem;color:var(--text3);margin-bottom:2px;}
.pending-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:18px;margin-bottom:10px;}
.pending-card h4{font-size:0.9rem;font-weight:700;margin-bottom:5px;}.pending-card .meta{font-size:0.8rem;color:var(--text2);margin-bottom:8px;}.pending-card .meta b{color:var(--text);}
.cost-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:5px;}
.cost-item .name{font-weight:600;color:var(--accent);}.cost-item .price{font-family:'JetBrains Mono',monospace;font-weight:600;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--bg3);border-radius:14px;padding:24px;width:500px;max-height:82vh;overflow-y:auto;}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:14px;}
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;justify-content:center;padding-top:100px;}
.search-box{background:var(--bg2);border:1px solid var(--bg3);border-radius:14px;width:440px;max-height:360px;overflow:hidden;display:flex;flex-direction:column;}
.search-box input{background:none;border:none;padding:14px 18px;color:var(--text);font-size:0.95rem;outline:none;border-bottom:1px solid var(--bg3);}
.search-box .results{overflow-y:auto;}.search-box .result{padding:9px 18px;cursor:pointer;font-size:0.82rem;border-bottom:1px solid var(--bg3);color:var(--text2);}.search-box .result:hover{background:var(--bg3);}.search-box .result b{color:var(--text);}
.toast{position:fixed;bottom:18px;right:18px;background:var(--green);color:white;padding:9px 16px;border-radius:8px;font-weight:600;font-size:0.82rem;box-shadow:0 4px 20px rgba(0,0,0,0.3);z-index:9999;animation:si .2s;}
@keyframes si{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:14px;padding:36px;width:340px;text-align:center;}
.login-card h1{font-size:1.5rem;font-weight:800;margin-bottom:2px;}.login-card h1 span{color:var(--accent);}
.login-card .sub{color:var(--text3);font-size:0.8rem;margin-bottom:20px;}.login-card .fg{text-align:left;}.login-card .btn{width:100%;justify-content:center;margin-top:4px;}.login-card .hint{font-size:0.7rem;color:var(--text3);margin-top:10px;}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:0.82rem;}
.divider{border:none;border-top:1px solid var(--bg3);margin:16px 0;}
.st{font-size:0.9rem;font-weight:700;margin-bottom:10px;}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--bg3);border-radius:8px;padding:2px;}
.tabs button{flex:1;padding:6px 10px;border:none;background:none;color:var(--text3);font-weight:600;border-radius:6px;cursor:pointer;font-size:0.78rem;}.tabs button.active{background:var(--bg2);color:var(--text);}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.filters select{background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:5px 8px;color:var(--text2);font-size:0.78rem;}
.warn{background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.15);border-radius:8px;padding:9px 12px;margin-bottom:14px;color:var(--amber);font-weight:600;font-size:0.82rem;}
.theme-toggle{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:8px 14px;cursor:pointer;margin-bottom:12px;color:var(--text2);font-size:0.84rem;font-weight:500;}
.theme-toggle:hover{border-color:var(--accent);}
.parrain-card{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:18px;margin-bottom:10px;}
.parrain-card h4{font-size:0.9rem;font-weight:700;margin-bottom:4px;color:var(--text);}
.parrain-card .stats{display:flex;gap:16px;font-size:0.8rem;color:var(--text2);margin-bottom:8px;}
.parrain-card .stats b{color:var(--text);}
.trans-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:0.8rem;}
.checkbox-group{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:10px;}
.checkbox-item{display:flex;align-items:center;gap:6px;}
.checkbox-item input[type="checkbox"]{margin:0;cursor:pointer;width:16px;height:16px;}
.checkbox-item label{margin:0;cursor:pointer;font-size:0.85rem;user-select:none;}
.manual-costs{background:var(--bg);border:1px solid var(--bg3);border-radius:8px;padding:10px;margin-bottom:10px;}
.cost-input-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.cost-input-row input{flex:1;padding:6px 8px;border:1px solid var(--bg3);border-radius:6px;background:var(--bg);color:var(--text);font-size:0.8rem;}
.cost-input-row button{padding:4px 8px;background:var(--accent-glow);color:var(--accent);border:none;border-radius:6px;cursor:pointer;font-size:0.7rem;font-weight:600;}
.chart-container{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:18px;margin-bottom:18px;position:relative;height:320px;}
.chart-row{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-bottom:18px;}
.chart-row.full{grid-template-columns:1fr;}
.leaderboard{background:var(--bg2);border:1px solid var(--bg3);border-radius:12px;padding:14px;}
.leaderboard-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bg3);font-size:0.85rem;}
.leaderboard-item.header{font-weight:700;color:var(--text);border:none;}
.leaderboard-item:last-child{border:none;}
.leaderboard-rank{font-weight:700;color:var(--accent);min-width:25px;}
.leaderboard-name{flex:1;padding:0 10px;}
.leaderboard-value{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--green);}

/* ── HAMBURGER ── */
.hamburger{display:none;align-items:center;justify-content:center;background:none;border:none;color:var(--text);cursor:pointer;padding:4px 8px;font-size:1.3rem;margin-right:4px;border-radius:8px;}
.hamburger:hover{background:var(--bg3);}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:99;}

/* ── BOTTOM NAV ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sidebar-bg);border-top:1px solid var(--sidebar-border);z-index:100;padding:4px 0 max(env(safe-area-inset-bottom,0px),4px);}
.bnav-items{display:flex;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px 5px;border:none;background:none;color:#64748b;cursor:pointer;gap:3px;font-size:0.6rem;font-weight:700;letter-spacing:0.3px;position:relative;border-top:2px solid transparent;transition:color .15s;}
.bnav-item .bi{font-size:1.25rem;line-height:1;}
.bnav-item.active{color:var(--accent);border-top-color:var(--accent);}
.bnav-badge{position:absolute;top:3px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:0.55rem;font-weight:700;padding:1px 4px;border-radius:8px;min-width:14px;text-align:center;}

/* ── MOBILE ── */
@media(max-width:768px){
  /* Sidebar slide-in */
  .hamburger{display:flex;}
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;width:260px;}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{display:block;}

  /* Layout */
  .main{margin-left:0;padding-bottom:74px;}
  .bottom-nav{display:block;}
  .topbar{padding:10px 14px;}
  .topbar h1{font-size:0.98rem;}
  .content{padding:12px 12px 18px;}

  /* KPI grid 2 colonnes */
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .kpi{padding:13px 11px;}
  .kpi .value{font-size:1.1rem;}
  .kpi .label{font-size:0.64rem;}

  /* Modal slide-up depuis le bas */
  .modal-bg{align-items:flex-end;padding:0;}
  .modal{width:100%;max-width:100%;border-radius:20px 20px 0 0;max-height:92vh;padding:8px 16px 24px;}
  .modal::before{content:'';display:block;width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:0 auto 14px;}

  /* Formulaires plus grands pour les doigts */
  .row{grid-template-columns:1fr;}
  .fg input,.fg select,.fg textarea{padding:10px 12px;font-size:0.9rem;}
  .btn{padding:9px 16px;font-size:0.82rem;}
  .btn-sm{padding:7px 11px;font-size:0.74rem;}

  /* Tables scrollables */
  .tbl{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl th{font-size:0.65rem;padding:8px 9px;white-space:nowrap;}
  .tbl td{font-size:0.78rem;padding:8px 9px;white-space:nowrap;}

  /* Charts */
  .chart-row{grid-template-columns:1fr;}
  .chart-container{height:220px;padding:12px;}

  /* Recherche */
  .search-overlay{padding:36px 12px 0;}
  .search-box{width:100%;}

  /* Divers */
  .filters{gap:4px;flex-wrap:wrap;}
  .filters select{font-size:0.75rem;padding:5px 6px;}
  .card{padding:14px;}
  .profil-h{padding:18px;}
  .parrain-card .stats{flex-wrap:wrap;gap:8px;}
}
</style>
</head>
<body class="dark">
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const API='https://salesflow-api-production.up.railway.app';
const TECHNIQUES=["FTID","LIT","RTS","DNA","EB"];
const fmt=n=>new Intl.NumberFormat('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);
const sc=s=>s==='En cours'?'en-cours':s==='Validée'?'validee':s==='Payée'?'payee':'annulee';
const pc=p=>p==='Payée'?'payee':'non-payee';

async function $api(path,opts={}){const token=localStorage.getItem('token');const res=await fetch(`${API}${path}`,{...opts,headers:{'Content-Type':'application/json',...(token&&{Authorization:`Bearer ${token}`})},body:opts.body?JSON.stringify(opts.body):undefined});if(!res.ok)throw new Error(await res.text());return res.json();}
function Toast({msg,onClose}){useEffect(()=>{const t=setTimeout(onClose,2500);return()=>clearTimeout(t)},[]);return<div className="toast">{msg}</div>}
function Modal({children,onClose}){return<div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>{children}</div></div>}
function Login({onLogin}){const[u,setU]=useState('');const[p,setP]=useState('');const[err,setErr]=useState('');const go=async e=>{e.preventDefault();try{const d=await $api('/api/login',{method:'POST',body:{username:u,password:p}});localStorage.setItem('token',d.token);localStorage.setItem('username',d.username);onLogin(d.username)}catch{setErr('Identifiants incorrects')}};return<div className="login-page"><form className="login-card" onSubmit={go}><h1>⚡ Sales<span>Flow</span></h1><p className="sub">Gestion des Ventes</p><div className="fg"><label>Identifiant</label><input value={u} onChange={e=>setU(e.target.value)}/></div><div className="fg"><label>Mot de passe</label><input type="password" value={p} onChange={e=>setP(e.target.value)}/></div>{err&&<p style={{color:'var(--red)',fontSize:'.8rem',margin:'4px 0'}}>{err}</p>}<button className="btn btn-p" type="submit">Se connecter</button><p className="hint">admin / admin</p></form></div>}
function BottomNav({page,nav,pending,onMore}){
  const items=[
    {key:'dashboard',icon:'📊',label:'Dashboard'},
    {key:'commandes',icon:'📋',label:'Commandes'},
    {key:'demandes',icon:'📩',label:'Demandes',badge:pending},
    {key:'clients',icon:'👤',label:'Clients'},
  ];
  const isOther=!items.find(it=>it.key===page);
  return<div className="bottom-nav"><div className="bnav-items">
    {items.map(it=><button key={it.key} className={"bnav-item"+(page===it.key?' active':'')} onClick={()=>nav(it.key)}>
      {it.badge>0&&<span className="bnav-badge">{it.badge}</span>}
      <span className="bi">{it.icon}</span><span>{it.label}</span>
    </button>)}
    <button className={"bnav-item"+(isOther?' active':'')} onClick={onMore}>
      <span className="bi">☰</span><span>Plus</span>
    </button>
  </div></div>
}

function Commandes({toast,showModal}){const[cmds,setCmds]=useState([]);const[show,setShow]=useState(false);const[editId,setEditId]=useState(null);const[f,setF]=useState({acheteur_nom:'',boutique:'',montant_total:0,commission_mode:'pct',commission_pct:0,commission_eur:0,notes:'',statut:'En cours',paiement:'Non payée',technique:''});const[fS,setFS]=useState('');const[fP,setFP]=useState('');const load=()=>$api('/api/commandes').then(setCmds);useEffect(()=>{load()},[]);

const edit=c=>{setEditId(c.id);setF({acheteur_nom:c.acheteur,boutique:c.boutique,montant_total:c.montant_total,commission_mode:c.commission_mode,commission_pct:c.commission_vendeur_pct,commission_eur:c.commission_vendeur_eur,notes:c.notes,statut:c.statut,paiement:c.paiement||'Non payée',technique:c.technique||''});setShow(true)};

<tbody>{filtered.map(c=><tr key={c.id}><td>{c.id}</td><td>{c.date?.slice(0,10)}</td><td>{c.acheteur}</td><td>{c.boutique}</td><td style={{fontFamily:'var(--mono)'}}>{fmt(c.montant_total)} €</td><td style={{fontFamily:'var(--mono)'}}>{fmt(c.commission_vendeur_eur)} €</td><td>{c.technique&&<span className="bt">{c.technique.split(',').map(x=>x.trim()).join(', ')}</span>}</td><td style={{fontFamily:'var(--mono)'}}>{fmt(c.cout_total)} €</td><td><span className={`bs ${sc(c.statut)}`}>{c.statut}</span></td><td><span className={`bs ${pc(c.paiement)} ${c.statut==='Validée'?'clickable':''}`} onClick={()=>c.statut==='Validée'&&togglePay(c.id)}>{c.paiement||'Non payée'}</span></td><td style={{display:'flex',gap:3}}><button className="btn btn-g btn-sm" onClick={()=>edit(c)}>✏️</button><button className="btn btn-d btn-sm" onClick={()=>{$api(`/api/commandes/${c.id}`,{method:'DELETE'}).then(load)}}>🗑️</button></td></tr>)}</tbody></table></div>
{show&&<Modal onClose={()=>setShow(false)}><h3>{editId?`Modifier #${editId}`:'Nouvelle commande'}</h3>{!editId&&<div className="fg"><label>Client</label><input value={f.acheteur_nom} onChange={e=>setF({...f,acheteur_nom:e.target.value})} placeholder="Créé auto si nouveau"/></div>}<div className="row"><div className="fg"><label>Boutique</label><input value={f.boutique} onChange={e=>setF({...f,boutique:e.target.value})}/></div><div className="fg"><label>Montant (€)</label><input type="number" step="0.5" value={f.montant_total} onChange={e=>setF({...f,montant_total:+e.target.value})}/></div></div><div className="row"><div className="fg"><label>Type commission</label><select value={f.commission_mode} onChange={e=>setF({...f,commission_mode:e.target.value})}><option value="pct">En %</option><option value="fixe">Fixe €</option></select></div><div className="fg"><label>{f.commission_mode==='pct'?'%':'€'}</label><input type="number" step="0.5" value={f.commission_mode==='pct'?f.commission_pct:f.commission_eur} onChange={e=>{const v=+e.target.value;setF({...f,...(f.commission_mode==='pct'?{commission_pct:v}:{commission_eur:v})})}}/></div></div><div className="fg"><label>Techniques (coûts multiples)</label><div className="checkbox-group">{TECHNIQUES.map(t=>{const selected=(f.technique||'').split(',').map(x=>x.trim()).includes(t);return<div key={t} className="checkbox-item"><input type="checkbox" id={`tech-${t}`} checked={selected} onChange={()=>toggleTechnique(t)}/><label htmlFor={`tech-${t}`}>{t}</label></div>})}</div></div>{editId&&<div className="row"><div className="fg"><label>Statut</label><select value={f.statut} onChange={e=>setF({...f,statut:e.target.value})}><option>En cours</option><option>Validée</option><option>Annulée</option></select></div><div className="fg"><label>Paiement</label><select value={f.paiement} onChange={e=>setF({...f,paiement:e.target.value})}><option>Non payée</option><option>Payée</option></select></div></div>}<div className="fg"><label>Notes</label><input value={f.notes} onChange={e=>setF({...f,notes:e.target.value})}/></div><button className="btn btn-p" onClick={save}>✅ {editId?'Sauvegarder':'Créer'}</button></Modal>}</div>}

function Parrains({toast}){

  const[showNew,setShowNew]=useState(false);const[clients,setClients]=useState([]);const[newParrain,setNewParrain]=useState('');
  const load=()=>{$api('/api/parrains').then(setParrains);$api('/api/acheteurs').then(setClients)};
  useEffect(()=>{load()},[]);
  const loadTrans=nom=>{setSelected(nom);$api(`/api/parrains/${encodeURIComponent(nom)}/transactions`).then(setTrans)};
  const addTrans=async()=>{if(addForm.montant<=0||!selected)return;await $api('/api/parrains/transaction',{method:'POST',body:{parrain_nom:selected,montant:addForm.montant,description:addForm.description}});toast(`+${addForm.montant} € pour ${selected}`);setAddForm({montant:0,description:''});setShowAdd(false);load();loadTrans(selected)};
  
  return<div>

      <div className="stats"><span>Comm. auto: <b style={{color:'var(--accent)'}}>{fmt(p.comm_auto)} €</b></span><span>Primes: <b style={{color:'var(--amber)'}}>{fmt(p.transactions_manuelles)} €</b></span><span>Total dû: <b style={{color:'var(--red)'}}>{fmt(p.total_du)} €</b></span></div>
      <button className="btn btn-g btn-sm" style={{marginTop:6}} onClick={()=>loadTrans(p.parrain)}>📋 Voir les transactions</button>
    </div>)}
    
    {selected&&trans&&<Modal onClose={()=>{setSelected(null);setTrans(null)}}><h3>Transactions — {selected}</h3>

    </Modal>}
    
    {showAdd&&<Modal onClose={()=>setShowAdd(false)}><h3>+ Transaction pour {selected}</h3>
      <div className="fg"><label>Montant (€)</label><input type="number" step="0.5" value={addForm.montant} onChange={e=>setAddForm({...addForm,montant:+e.target.value})}/></div>
      <div className="fg"><label>Description</label><input value={addForm.description} onChange={e=>setAddForm({...addForm,description:e.target.value})} placeholder="Ex: Prime de bienvenue"/></div>
      <button className="btn btn-p" onClick={addTrans}>✅ Ajouter</button>
    </Modal>}

    {showNew&&<Modal onClose={()=>setShowNew(false)}><h3>Ajouter un parrain</h3>
      <p style={{fontSize:'.82rem',color:'var(--text3)',marginBottom:12}}>Sélectionnez un client existant ou tapez un nouveau nom. Le parrain doit ensuite être assigné à un client dans son profil.</p>
      <div className="fg"><label>Nom du parrain</label><input value={newParrain} onChange={e=>setNewParrain(e.target.value)} placeholder="Tapez un nom..." list="clients-list"/><datalist id="clients-list">{clients.map(c=><option key={c.id} value={c.nom}/>)}</datalist></div>
      <button className="btn btn-p" onClick={()=>{if(newParrain.trim()){toast(`Parrain "${newParrain}" — Assignez-le à un client dans son profil`);setShowNew(false);setNewParrain('')}}}>✅ OK</button>
    </Modal>}
  </div>
}

function Finances(){const[data,setData]=useState(null);const[tab,setTab]=useState('boutiques');useEffect(()=>{$api('/api/finances').then(setData)},[]);if(!data)return<div className="empty">Chargement...</div>;
return<div><div className="tabs"><button className={tab==='boutiques'?'active':''} onClick={()=>setTab('boutiques')}>🏪 Boutiques</button><button className={tab==='nonpayees'?'active':''} onClick={()=>setTab('nonpayees')}>⏳ Non payées</button></div>
{tab==='boutiques'&&<div className="tbl"><table><thead><tr><th>Boutique</th><th>Commandes</th><th>CA</th><th>Commission</th><th>Coûts</th><th>Profit</th></tr></thead><tbody>{data.boutiques.map(b=><tr key={b.boutique}><td style={{fontWeight:600}}>{b.boutique}</td><td>{b.commandes}</td><td>{fmt(b.ca)} €</td><td>{fmt(b.commission)} €</td><td>{fmt(b.couts)} €</td><td style={{color:b.commission-b.couts>=0?'var(--green)':'var(--red)',fontWeight:600}}>{fmt(b.commission-b.couts)} €</td></tr>)}</tbody></table></div>}
{tab==='nonpayees'&&(data.non_payees.length===0?<div className="empty">Tout est payé 🎉</div>:<div className="tbl"><table><thead><tr><th>ID</th><th>Date</th><th>Client</th><th>Boutique</th><th>Montant</th><th>Commission</th></tr></thead><tbody>{data.non_payees.map(c=><tr key={c.id}><td>{c.id}</td><td>{c.date?.slice(0,10)}</td><td>{c.acheteur}</td><td>{c.boutique}</td><td>{fmt(c.montant_total)} €</td><td style={{color:'var(--amber)',fontWeight:600}}>{fmt(c.commission_vendeur_eur)} €</td></tr>)}</tbody></table></div>)}</div>}

function Couts({toast}){const[couts,setCouts]=useState([]);const[nom,setNom]=useState(TECHNIQUES[0]);const[prix,setPrix]=useState(0);const load=()=>$api('/api/couts').then(setCouts);useEffect(()=>{load()},[]);const save=async()=>{if(prix<=0)return;await $api('/api/couts',{method:'POST',body:{nom,prix}});toast(`${nom} → ${prix} €`);load();setPrix(0)};
return<div>{couts.map(c=><div className="cost-item" key={c.nom}><span className="name">{c.nom}</span><span className="price">{fmt(c.prix)} €</span><button className="btn btn-d btn-sm" onClick={()=>{$api(`/api/couts/${c.nom}`,{method:'DELETE'}).then(load)}}>🗑️</button></div>)}<hr className="divider"/><div className="card"><div className="row"><div className="fg"><label>Technique</label><select value={nom} onChange={e=>setNom(e.target.value)}>{TECHNIQUES.map(t=><option key={t}>{t}</option>)}</select></div><div className="fg"><label>Prix (€)</label><input type="number" step="0.5" value={prix} onChange={e=>setPrix(+e.target.value)}/></div></div><button className="btn btn-p" onClick={save}>💾 Enregistrer</button></div></div>}

function Parametres({toast,username,theme,setTheme}){const[op,setOp]=useState('');const[np,setNp]=useState('');const[np2,setNp2]=useState('');
const changePw=async()=>{if(np!==np2)return toast('Pas identiques');try{await $api('/api/change-password',{method:'POST',body:{username,old_password:op,new_password:np}});toast('Modifié !')}catch{toast('Erreur')}};
const reset=async()=>{if(!confirm('⚠️ TOUT supprimer ? Irréversible.'))return;await $api('/api/reset',{method:'POST'});toast('Réinitialisé')};
const toggleTheme=()=>{const newT=theme==='dark'?'light':'dark';setTheme(newT);document.body.className=newT;localStorage.setItem('theme',newT);$api('/api/settings',{method:'POST',body:{key:'theme',value:newT}})};
return<div>
  <div className="card"><div className="st">🎨 Thème</div><div className="theme-toggle" onClick={toggleTheme}>{theme==='dark'?'🌙 Sombre':'☀️ Clair'} — Cliquer pour changer</div></div>
  <div className="card"><div className="st">🔐 Mot de passe</div><div className="fg"><label>Actuel</label><input type="password" value={op} onChange={e=>setOp(e.target.value)}/></div><div className="row"><div className="fg"><label>Nouveau</label><input type="password" value={np} onChange={e=>setNp(e.target.value)}/></div><div className="fg"><label>Confirmer</label><input type="password" value={np2} onChange={e=>setNp2(e.target.value)}/></div></div><button className="btn btn-p" onClick={changePw}>🔐 Modifier</button></div>
  <hr className="divider"/>
  <div className="card"><div className="st">⚠️ Zone de danger</div><p style={{color:'var(--text3)',fontSize:'.8rem',marginBottom:10}}>Supprime toutes les données sauf coûts et compte admin.</p><button className="btn btn-d" onClick={reset}>🗑️ Tout réinitialiser</button></div>
</div>}

function Analytique(){const[data,setData]=useState(null);const chartRef1=React.useRef(null);const chartRef2=React.useRef(null);const chartChart1=React.useRef(null);const chartChart2=React.useRef(null);const chartRef3=React.useRef(null);const chartRef4=React.useRef(null);const chartChart3=React.useRef(null);const chartChart4=React.useRef(null);
useEffect(()=>{Promise.all([$api('/api/analytics/ca-trend'),$api('/api/analytics/top-clients'),$api('/api/analytics/statut'),$api('/api/analytics/commissions-evolution').catch(()=>[]),$api('/api/analytics/boutiques').catch(()=>[])]).then(([trend,top,statut,commEvol,boutiques])=>{setData({trend:trend||[],top:top||{clients:[],parrains:[]},statut:statut||[],commEvol:commEvol||[],boutiques:boutiques||[]})}).catch(err=>{console.error('Analytics Error:',err);setData({trend:[],top:{clients:[],parrains:[]},statut:[],commEvol:[],boutiques:[]})})},[]); 
useEffect(()=>{if(!data||!chartRef1.current||!chartRef2.current||!chartRef3.current||!chartRef4.current||!window.Chart)return;
if(chartChart1.current)chartChart1.current.destroy();if(chartChart2.current)chartChart2.current.destroy();if(chartChart3.current)chartChart3.current.destroy();if(chartChart4.current)chartChart4.current.destroy();
const ctx1=chartRef1.current.getContext('2d');
chartChart1.current=new window.Chart(ctx1,{type:'line',data:{labels:data.trend.map(d=>d.mois),datasets:[{label:'CA',data:data.trend.map(d=>d.ca),borderColor:'#8b5cf6',backgroundColor:'rgba(139,92,246,0.05)',tension:0.3},{label:'Commissions',data:data.trend.map(d=>d.comm_payee),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.05)',tension:0.3},{label:'Coûts',data:data.trend.map(d=>d.couts_payes),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.05)',tension:0.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,color:'#a1a1aa',font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{color:'#71717a',font:{size:10}},grid:{color:'rgba(113,113,122,0.1)'}},x:{ticks:{color:'#71717a',font:{size:10}},grid:{display:false}}}}});
const statutData=data.statut.reduce((acc,s)=>{const key=`${s.statut}-${s.paiement||'Non payée'}`;const idx=acc.findIndex(x=>x.label===key);if(idx>=0)acc[idx].count+=s.count;else acc.push({label:key,count:s.count,ca:s.ca});return acc},[]);
const ctx2=chartRef2.current.getContext('2d');
chartChart2.current=new window.Chart(ctx2,{type:'doughnut',data:{labels:statutData.map(s=>s.label),datasets:[{data:statutData.map(s=>s.count),backgroundColor:['#f59e0b','#3b82f6','#22c55e','#ef4444','#6366f1'],borderColor:'rgba(24,24,27,1)',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#a1a1aa',font:{size:11}}}},layout:{padding:10}}});
const ctx3=chartRef3.current.getContext('2d');chartChart3.current=new window.Chart(ctx3,{type:'line',data:{labels:(data.commEvol||[]).map(d=>d.mois),datasets:[{label:'En cours',data:(data.commEvol||[]).map(d=>d.comm_en_cours),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.1)',tension:0.3,fill:true,pointRadius:4},{label:'Validées',data:(data.commEvol||[]).map(d=>d.comm_validee),borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.1)',tension:0.3,fill:true,pointRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,color:'#a1a1aa',font:{size:11}}}},scales:{y:{beginAtZero:true,ticks:{color:'#71717a',font:{size:10},callback:v=>v+'€'},grid:{color:'rgba(113,113,122,0.1)'}},x:{ticks:{color:'#71717a',font:{size:10}},grid:{display:false}}}}});
const ctx4=chartRef4.current.getContext('2d');chartChart4.current=new window.Chart(ctx4,{type:'bar',data:{labels:(data.boutiques||[]).map(b=>b.boutique),datasets:[{label:'Commandes',data:(data.boutiques||[]).map(b=>b.commandes),backgroundColor:['#8b5cf6','#3b82f6','#22c55e','#f59e0b','#ef4444','#6366f1','#ec4899','#14b8a6'],borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>`${ctx.parsed.x} cmd (${(data.boutiques||[])[ctx.dataIndex]?.pct}%)`}}},scales:{x:{beginAtZero:true,ticks:{color:'#71717a',font:{size:10}},grid:{color:'rgba(113,113,122,0.1)'}},y:{ticks:{color:'#a1a1aa',font:{size:11}},grid:{display:false}}}}});
},[data]);
if(!data)return<div className="empty">Chargement...</div>;
if(!data.trend.length && !data.top.clients.length)return<div className="empty">❌ Erreur: aucune donnée disponible. Vérifiez votre connexion.</div>;
return<div>
<div className="chart-row"><div className="chart-container"><canvas ref={chartRef1}></canvas></div><div className="leaderboard"><div className="leaderboard-item header"><span className="leaderboard-rank">#</span><span className="leaderboard-name">Client</span><span className="leaderboard-value">CA</span></div>{data.top.clients.slice(0,8).map((c,i)=><div className="leaderboard-item" key={`c${i}`}><span className="leaderboard-rank">{i+1}</span><span className="leaderboard-name">{c.nom}</span><span className="leaderboard-value">{fmt(c.ca)} €</span></div>)}</div></div>
<div className="chart-row"><div className="leaderboard"><div className="leaderboard-item header"><span className="leaderboard-rank">#</span><span className="leaderboard-name">Parrain</span><span className="leaderboard-value">Filleuls</span></div>{data.top.parrains.slice(0,8).map((p,i)=><div className="leaderboard-item" key={`p${i}`}><span className="leaderboard-rank">{i+1}</span><span className="leaderboard-name">{p.nom}</span><span className="leaderboard-value">{p.filleuls} 👥</span></div>)}</div><div className="chart-container"><canvas ref={chartRef2}></canvas></div></div>
<div style={{marginTop:8,marginBottom:6,fontSize:'0.7rem',color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Évolution des commissions</div>
<div className="chart-row full"><div className="chart-container"><canvas ref={chartRef3}></canvas></div></div>
<div style={{marginTop:8,marginBottom:6,fontSize:'0.7rem',color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:1}}>Répartition par boutique</div>
<div className="chart-row"><div className="chart-container"><canvas ref={chartRef4}></canvas></div><div className="leaderboard"><div className="leaderboard-item header"><span className="leaderboard-rank">#</span><span className="leaderboard-name">Boutique</span><span className="leaderboard-value">Cmds / %</span></div>{(data.boutiques||[]).map((b,i)=><div className="leaderboard-item" key={`b${i}`}><span className="leaderboard-rank">{i+1}</span><span className="leaderboard-name" style={{fontSize:'0.8rem'}}>{b.boutique}</span><span className="leaderboard-value">{b.commandes} <span style={{color:'var(--text3)',fontWeight:400}}>({b.pct}%)</span></span></div>)}</div></div>
</div>}

function App(){
  const[user,setUser]=useState(localStorage.getItem('username'));const[page,setPage]=useState('dashboard');const[profilId,setProfilId]=useState(null);const[toastMsg,setToastMsg]=useState('');const[showSearch,setShowSearch]=useState(false);const[pending,setPending]=useState(0);const[cmdModal,setCmdModal]=useState(0);const[sidebarOpen,setSidebarOpen]=useState(false);
  const[theme,setTheme]=useState(localStorage.getItem('theme')||'dark');
  useEffect(()=>{document.body.className=theme},[theme]);
  useEffect(()=>{if(user)$api('/api/dashboard').then(d=>setPending(d.pending)).catch(()=>{})},[user,page]);
  const toast=m=>setToastMsg(m);const nav=p=>setPage(p);const logout=()=>{localStorage.clear();setUser(null)};
  if(!user)return<Login onLogin={setUser}/>;
  const menu=[{s:'PRINCIPAL'},{key:'dashboard',icon:'📊',label:'Dashboard'},{key:'commandes',icon:'📋',label:'Commandes'},{key:'demandes',icon:'📩',label:'Demandes',badge:pending},{s:'GESTION'},{key:'clients',icon:'👤',label:'Clients'},{key:'parrains',icon:'🤝',label:'Parrains'},{key:'finances',icon:'💵',label:'Finances'},{key:'analytique',icon:'📈',label:'Analytique'},{s:'CONFIG'},{key:'couts',icon:'💰',label:'Coûts'},{key:'parametres',icon:'⚙️',label:'Paramètres'}];
  const titles={dashboard:'Dashboard',commandes:'Commandes',demandes:'Demandes',clients:'Clients',profil:'Profil',parrains:'Parrains',finances:'Finances',analytique:'Analytique',couts:'Coûts',parametres:'Paramètres'};
  return<div className="app">
    {sidebarOpen&&<div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)}/>}
    <div className={"sidebar"+(sidebarOpen?" open":"")}><div className="logo">⚡ <span>SalesFlow</span></div><div className="user">{user}</div>
    <nav>{menu.map((m,i)=>m.s?<div key={i} className="sl">{m.s}</div>:<button key={m.key} className={page===m.key?'active':''} onClick={()=>{nav(m.key);setSidebarOpen(false)}}><span>{m.icon}</span><span>{m.label}</span>{m.badge>0&&<span className="badge">{m.badge}</span>}</button>)}</nav>
    <div className="bottom"><button onClick={logout}>Déconnexion</button></div></div>
    <div className="main"><div className="topbar"><button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)}>☰</button><h1>{page==='profil'?'🔎 Profil':`${(menu.find(m=>m.key===page)||{}).icon||''} ${titles[page]||''}`}</h1><div className="topbar-actions"><button className="search-btn" onClick={()=>setShowSearch(true)}>🔍</button>{(page==='dashboard'||page==='commandes')&&<button className="btn btn-p btn-sm" onClick={()=>{setPage('commandes');setCmdModal(c=>c+1)}}>➕ Commande</button>}</div></div>
    <div className="content">
      {page==='dashboard'&&<Dashboard/>}
      {page==='demandes'&&<Demandes toast={toast}/>}
      {page==='commandes'&&<Commandes toast={toast} showModal={cmdModal}/>}
      {page==='clients'&&<Clients toast={toast} onSelect={id=>{setProfilId(id);setPage('profil')}}/>}
      {page==='profil'&&profilId&&<Profil aid={profilId} toast={toast}/>}
      {page==='parrains'&&<Parrains toast={toast}/>}
      {page==='finances'&&<Finances/>}
      {page==='analytique'&&<Analytique/>}
      {page==='couts'&&<Couts toast={toast}/>}
      {page==='parametres'&&<Parametres toast={toast} username={user} theme={theme} setTheme={setTheme}/>}
    </div></div>
    <BottomNav page={page} nav={p=>{nav(p);setSidebarOpen(false)}} pending={pending} onMore={()=>setSidebarOpen(o=>!o)}/>
    {showSearch&&<SearchOverlay onClose={()=>setShowSearch(false)} onSelect={r=>{if(r.type==='acheteur'){setProfilId(r.id);setPage('profil')}}}/>}
    {toastMsg&&<Toast msg={toastMsg} onClose={()=>setToastMsg('')}/>}
  </div>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
